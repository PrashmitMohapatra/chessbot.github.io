<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prashmit AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#0f172a;
height:100vh;
overflow:hidden;
}

/* APP LAYOUT */

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#111827;
border-right:1px solid #1f2937;
display:flex;
flex-direction:column;
}

.logo{
padding:20px;
color:white;
font-size:22px;
font-weight:700;
border-bottom:1px solid #1f2937;
}

.new-chat{
margin:15px;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}

.chat-list{
flex:1;
overflow-y:auto;
padding:10px;
}

.chat-item{
padding:12px;
margin-bottom:8px;
border-radius:10px;
background:#1f2937;
color:#e5e7eb;
cursor:pointer;
}

.chat-item.active{
background:#2563eb;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* TOPBAR */

.topbar{
height:70px;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #1f2937;
color:white;
gap:10px;
}

.menu-btn{
font-size:24px;
cursor:pointer;
display:none;
}

/* CHAT AREA */

.chat-container{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:15px;
}

/* MESSAGE */

.message-wrapper{
display:flex;
align-items:flex-end;
gap:10px;
max-width:75%;
animation:fadeIn .25s ease;
}

.user-wrapper{
align-self:flex-end;
flex-direction:row-reverse;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
background:#1f2937;
color:white;
}

.user .avatar{
background:#2563eb;
}

.message{
padding:14px 18px;
border-radius:18px;
line-height:1.5;
color:white;
}

.user{
background:#2563eb;
}

.bot{
background:#1f2937;
}

/* INPUT */

.input-area{
padding:20px;
display:flex;
gap:10px;
border-top:1px solid #1f2937;
background:#111827;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
outline:none;
}

button{
padding:15px 18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* TYPING */

.typing{
display:flex;
gap:4px;
padding:14px 18px;
background:#1f2937;
border-radius:18px;
width:60px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:#94a3b8;
animation:bounce 1s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

/* FADE */

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* MOBILE */

@media(max-width:768px){
.sidebar{
position:absolute;
left:-280px;
height:100%;
z-index:1000;
}
.sidebar.active{
left:0;
}
.menu-btn{
display:block;
}
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="logo">Prashmit AI</div>

<button class="new-chat" onclick="createNewChat()">+ New Chat</button>

<div class="chat-list" id="chatList"></div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="menu-btn" onclick="toggleSidebar()">☰</div>
<h2 id="chatTitle">New Chat</h2>
</div>

<div class="chat-container" id="chatBox"></div>

<div class="input-area">
<input id="messageInput" placeholder="Send a message..." />
<button onclick="sendMessage()">➤</button>
</div>

</div>

</div>

<script>

/* DATA */

let chats = JSON.parse(localStorage.getItem("chats")) || [];
let currentChatId = null;
let typingDiv = null;

/* INIT */

function init(){
if(chats.length===0) createNewChat();
else loadChat(chats[0].id);
renderChatList();
}

/* NEW CHAT */

function createNewChat(){

const chat = {
id:Date.now(),
title:"New Chat",
messages:[]
};

chats.unshift(chat);
save();
loadChat(chat.id);
renderChatList();
}

/* LOAD */

function loadChat(id){

currentChatId=id;

const chat = chats.find(c=>c.id===id);

const box = document.getElementById("chatBox");
box.innerHTML="";

chat.messages.forEach(m=>{
renderMessage(m.role,m.text,false);
});

document.getElementById("chatTitle").innerText=chat.title;

renderChatList();
}

/* MESSAGE UI */

function renderMessage(role,text,animate=true){

const wrapper = document.createElement("div");
wrapper.classList.add("message-wrapper");

if(role==="user")
wrapper.classList.add("user-wrapper");

const avatar = document.createElement("div");
avatar.classList.add("avatar");
avatar.textContent = role==="user" ? "👤":"🤖";

const msg = document.createElement("div");
msg.classList.add("message",role);
msg.textContent=text;

wrapper.appendChild(avatar);
wrapper.appendChild(msg);

document.getElementById("chatBox").appendChild(wrapper);

document.getElementById("chatBox").scrollTop=999999;

}

/* TYPING INDICATOR */

function showTyping(){

const box=document.getElementById("chatBox");

typingDiv=document.createElement("div");
typingDiv.classList.add("message-wrapper");

const avatar=document.createElement("div");
avatar.classList.add("avatar");
avatar.textContent="🤖";

const typing=document.createElement("div");
typing.classList.add("typing");

typing.innerHTML=`
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
`;

typingDiv.appendChild(avatar);
typingDiv.appendChild(typing);

box.appendChild(typingDiv);

box.scrollTop=999999;

}

function hideTyping(){
if(typingDiv) typingDiv.remove();
}

/* SEND */

function sendMessage(){

const input=document.getElementById("messageInput");
const text=input.value.trim();
if(!text) return;

const chat=chats.find(c=>c.id===currentChatId);

/* user */
chat.messages.push({role:"user",text});
renderMessage("user",text);

/* bot logic */
let reply="I'm still learning...";

if(text.toLowerCase().includes("hello"))
reply="Hello! 👋";

if(text.toLowerCase().includes("book"))
reply="Books open new worlds.";

if(text.toLowerCase().includes("author"))
reply="Writing is creativity in motion.";

/* typing animation */
showTyping();

setTimeout(()=>{
hideTyping();

chat.messages.push({role:"bot",text:reply});
renderMessage("bot",reply);

save();
renderChatList();

},1000);

/* title */
if(chat.title==="New Chat"){
chat.title=text.slice(0,18);
}

save();
renderChatList();

input.value="";
}

/* CHAT LIST */

function renderChatList(){

const list=document.getElementById("chatList");
list.innerHTML="";

chats.forEach(c=>{

const div=document.createElement("div");

div.className="chat-item"+
(c.id===currentChatId?" active":"");

div.textContent=c.title;

div.onclick=()=>loadChat(c.id);

list.appendChild(div);

});

}

/* SAVE */

function save(){
localStorage.setItem("chats",JSON.stringify(chats));
}

/* SIDEBAR */

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

/* ENTER */

document.getElementById("messageInput")
.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* START */

init();

</script>

</body>
</html>
