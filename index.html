<!DOCTYPE html>
<html>
<head>
    <title>My AI Chatbot</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
        }

        #chatbox{
            height:400px;
            overflow-y:auto;
            background:white;
            border-radius:10px;
            padding:15px;
            border:1px solid #ddd;
            margin-bottom:10px;
        }

        .user{
            color:blue;
            margin:10px 0;
        }

        .bot{
            color:green;
            margin:10px 0;
        }

        input{
            width:75%;
            padding:10px;
        }

        button{
            padding:10px 15px;
        }
    </style>
</head>
<body>

<h1>My AI Chatbot</h1>

<div id="chatbox"></div>

<input type="text" id="message" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage(){

    let input = document.getElementById("message");
    let text = input.value.trim();

    if(text === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML +=
        `<div class="user"><b>You:</b> ${text}</div>`;

    let reply = "I don't understand yet.";

    if(text.toLowerCase().includes("hello")){
        reply = "Hello there!";
    }

    else if(text.toLowerCase().includes("book")){
        reply = "Tell me about your favorite book.";
    }

    else if(text.toLowerCase().includes("author")){
        reply = "Authors create amazing worlds.";
    }

    chatbox.innerHTML +=
        `<div class="bot"><b>Bot:</b> ${reply}</div>`;

    input.value = "";

    chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
</html>
