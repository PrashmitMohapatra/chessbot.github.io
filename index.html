<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prashmit AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    font-family:Inter,Arial,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.app{
    width:95%;
    max-width:900px;
    height:90vh;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.header{
    background:#1e293b;
    padding:20px;
    border-bottom:1px solid #334155;
}

.header h1{
    color:white;
    font-size:24px;
}

.header p{
    color:#94a3b8;
    margin-top:5px;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    max-width:75%;
    padding:14px 18px;
    border-radius:18px;
    line-height:1.5;
}

.user{
    align-self:flex-end;
    background:#2563eb;
    color:white;
}

.bot{
    align-self:flex-start;
    background:#1f2937;
    color:white;
}

.input-area{
    padding:20px;
    border-top:1px solid #334155;
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1f2937;
    color:white;
    font-size:16px;
}

button{
    border:none;
    padding:15px 22px;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

.welcome{
    text-align:center;
    color:#94a3b8;
    margin-top:50px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>Prashmit AI</h1>
<p>Your AI companion</p>
</div>

<div class="chat" id="chat">

<div class="welcome">
<h2>👋 Welcome</h2>
<p>Ask me anything.</p>
</div>

</div>

<div class="input-area">
<input
type="text"
id="message"
placeholder="Send a message..."
>

<button onclick="sendMessage()">➤</button>
</div>

</div>

<script>

const chat = document.getElementById("chat");

function addMessage(text,type){

const div=document.createElement("div");

div.classList.add("message");
div.classList.add(type);

div.innerHTML=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function sendMessage(){

const input=document.getElementById("message");

const text=input.value.trim();

if(!text) return;

document.querySelector(".welcome")?.remove();

addMessage(text,"user");

let reply="I'm still learning. Soon I'll know much more.";

if(text.toLowerCase().includes("hello"))
reply="Hello! Nice to meet you.";

if(text.toLowerCase().includes("book"))
reply="I love talking about books.";

if(text.toLowerCase().includes("author"))
reply="Writing is an adventure of its own.";

setTimeout(()=>{
addMessage(reply,"bot");
},500);

input.value="";

}

document.getElementById("message")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
