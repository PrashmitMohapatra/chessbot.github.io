<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Pro Max</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#111827;
display:flex;
flex-direction:column;
padding:10px;
}

.newchat{
padding:12px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.chatlist{
flex:1;
overflow:auto;
margin-top:10px;
}

.chatitem{
padding:10px;
margin:5px 0;
background:#1f2937;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.chatitem.active{
background:#2563eb;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:12px;
border-bottom:1px solid #1f2937;
display:flex;
justify-content:space-between;
align-items:center;
}

.box{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:12px;
border-radius:12px;
max-width:70%;
white-space:pre-wrap;
animation:fade .2s ease;
}

.user{background:#2563eb;align-self:flex-end;}
.bot{background:#1f2937;align-self:flex-start;}

.input{
display:flex;
padding:10px;
gap:10px;
background:#111827;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
}

button{
padding:12px 14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* typing dots */
.dots span{
display:inline-block;
width:6px;
height:6px;
background:#aaa;
border-radius:50%;
margin:0 2px;
animation:bounce 1s infinite;
}

.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="sidebar">
<button class="newchat" onclick="newChat()">+ New Chat</button>
<div class="chatlist" id="list"></div>
</div>

<div class="main">

<div class="topbar">
<div id="title">Chat</div>
<div>
<button onclick="startVoice()">🎤</button>
<button onclick="speak()">🔊</button>
</div>
</div>

<div class="box" id="box"></div>

<div class="input">
<input id="input" placeholder="Ask anything..." />
<button onclick="send()">➤</button>
</div>

</div>

<script>

/* 🔑 GEMINI KEY */
const API_KEY = "AQ.Ab8RN6J3usRn6rQqE0-RxlLQc7mWwW0x0lhHPhTWH45bpqclvg";

let chats = JSON.parse(localStorage.getItem("chats")) || [];
let current = null;

/* INIT */
function init(){
if(chats.length===0) newChat();
else load(chats[0].id);
renderList();
}

/* NEW CHAT */
function newChat(){
const c={
id:Date.now(),
title:"New Chat",
messages:[]
};
chats.unshift(c);
save();
load(c.id);
renderList();
}

/* LOAD */
function load(id){
current=id;
const chat=chats.find(c=>c.id===id);

document.getElementById("box").innerHTML="";
chat.messages.forEach(m=>add(m.role,m.text,false));

document.getElementById("title").innerText=chat.title;
renderList();
}

/* ADD MSG */
function add(role,text,saveMsg=true){

const div=document.createElement("div");
div.className="msg "+role;
div.innerText=text;

document.getElementById("box").appendChild(div);
document.getElementById("box").scrollTop=999999;

if(saveMsg){
const chat=chats.find(c=>c.id===current);
chat.messages.push({role,text});
save();
}
}

/* GEMINI */
async function getAI(msg){

const res = await fetch(
`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:msg}]}]
})
}
);

const data=await res.json();

return data.candidates?.[0]?.content?.parts?.[0]?.text
|| "No response";
}

/* SEND */
async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

add("user",text);
input.value="";

/* typing */
const t=document.createElement("div");
t.className="msg bot";
t.innerHTML=`Thinking <span class="dots"><span></span><span></span><span></span></span>`;
document.getElementById("box").appendChild(t);

const reply=await getAI(text);

t.remove();

/* stream effect */
let i=0;
const out=document.createElement("div");
out.className="msg bot";
document.getElementById("box").appendChild(out);

const interval=setInterval(()=>{
out.innerText=reply.slice(0,i);
i++;
if(i>reply.length) clearInterval(interval);
},10);

updateTitle(text);

}

/* TITLE */
function updateTitle(text){
const chat=chats.find(c=>c.id===current);
if(chat.title==="New Chat"){
chat.title=text.slice(0,20);
save();
renderList();
}
}

/* LIST */
function renderList(){
const list=document.getElementById("list");
list.innerHTML="";

chats.forEach(c=>{
const div=document.createElement("div");
div.className="chatitem"+(c.id===current?" active":"");
div.innerText=c.title;
div.onclick=()=>load(c.id);
list.appendChild(div);
});
}

/* SAVE */
function save(){
localStorage.setItem("chats",JSON.stringify(chats));
}

/* 🔊 SPEECH */
function speak(){
const chat=chats.find(c=>c.id===current);
if(!chat) return;

const last=chat.messages.filter(m=>m.role==="bot").pop();
if(!last) return;

speechSynthesis.speak(new SpeechSynthesisUtterance(last.text));
}

/* 🎤 VOICE INPUT */
function startVoice(){
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="en-US";

rec.onresult=e=>{
document.getElementById("input").value=e.results[0][0].transcript;
};

rec.start();
}

/* START */
init();

</script>

</body>
</html>
